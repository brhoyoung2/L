<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="no-cache">
  <title>카테고리 — TOONING BOOKS</title>
  <link rel="stylesheet" href="./assets/css/tokens.css?v=13">
  <link rel="stylesheet" href="./assets/css/components.css?v=13">
  <link rel="stylesheet" href="./assets/css/main.css?v=13">
  <link rel="icon" type="image/png" href="./images/favicon.png">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="container">
      <a href="./index.html" class="tooning-logo">
        <img src="./images/logo.png" alt="TOONING BOOKS" style="height:38px;display:block;object-fit:contain">
      </a>
      <div class="site-header__search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="도서 제목, 작가, 태그 검색">
      </div>
      <div class="site-header__actions">
        <span id="admin-badge" class="admin-badge" style="display:none">⚙️ 관리자 모드</span>
        <button class="btn-icon" title="알림">🔔</button>
        <button class="btn-icon" title="라이브러리">📚</button>
        <button class="btn-icon" title="프로필">👤</button>
      </div>
    </div>
  </header>

  <!-- ═══ NAV ═══ -->
  <nav class="site-nav">
    <div class="container">
      <a class="site-nav__item" href="./index.html">홈</a>
      <a class="site-nav__item" href="category.html?id=cat_popular">인기도서</a>
      <a class="site-nav__item site-nav__item--active" href="category.html">카테고리</a>
      <a class="site-nav__item" href="event.html">이벤트</a>
      <a class="site-nav__item" href="https://tooning.io" target="_blank">웹툰만들기</a>
    </div>
  </nav>

  <!-- ═══ 카테고리 히어로 ═══ -->
  <div id="cat-hero" class="cat-hero">
    <div class="container">
      <nav class="breadcrumb">
        <a href="./index.html">홈</a>
        <span class="breadcrumb__sep">›</span>
        <a href="category.html">카테고리</a>
        <span class="breadcrumb__sep" id="bc-sep2" style="display:none">›</span>
        <span id="bc-catname"></span>
      </nav>
      <div id="hero-content">
        <!-- 카테고리 없이 접근 시: 전체 카테고리 목록 -->
        <div id="all-cats-view">
          <div style="margin-bottom:8px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--color-primary)">CATEGORIES</div>
          <h1 style="font-size:36px;font-weight:800;margin:0 0 8px">전체 카테고리</h1>
          <p style="color:var(--color-text-2);margin:0 0 24px">원하는 카테고리를 선택해 도서를 탐색하세요.</p>
          <div id="cat-list-chips" style="display:flex;gap:10px;flex-wrap:wrap"></div>
        </div>

        <!-- 특정 카테고리 히어로 -->
        <div id="single-cat-view" style="display:none">
          <div class="cat-hero__label" id="hero-label">CATEGORY</div>
          <h1 class="cat-hero__title" id="hero-title">—</h1>
          <p class="cat-hero__desc" id="hero-desc"></p>
          <div class="cat-hero__stats" id="hero-stats"></div>
          <div class="cat-hero__grade-tabs" id="hero-grade-tabs"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 필터 바 ═══ -->
  <div class="filter-bar" id="filter-bar" style="display:none">
    <div class="container">
      <div class="filter-bar__left" id="active-filters">
        <!-- 적용된 필터 칩 -->
      </div>
      <div class="filter-bar__right">
        <div class="filter-select-wrap">
          <select id="sort-select" class="filter-select">
            <option value="popular">인기순</option>
            <option value="latest">최신순</option>
            <option value="likes">좋아요순</option>
            <option value="title">제목순</option>
          </select>
        </div>
        <div class="view-toggle">
          <button class="view-btn view-btn--active" data-view="grid" title="그리드">⊞</button>
          <button class="view-btn" data-view="list" title="리스트">☰</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ 도서 그리드 ═══ -->
  <main class="container" style="padding-top:32px;padding-bottom:60px">
    <div id="result-meta" style="display:none;font-size:14px;color:var(--color-text-3);margin-bottom:20px"></div>
    <div id="book-grid" class="book-grid"></div>
    <div id="empty-state" style="display:none;padding:60px;text-align:center;color:var(--color-text-3)">
      <div style="font-size:40px;margin-bottom:12px">🔍</div>
      <p>해당하는 도서가 없습니다.</p>
    </div>
    <!-- 페이지네이션 -->
    <nav class="pagination" id="pagination" style="display:none"></nav>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="site-footer">
    <div class="container">
      <div class="tooning-logo tooning-logo--sm">
        <img src="./images/logo.png" alt="TOONING BOOKS" style="height:28px;display:block;object-fit:contain">
      </div>
      <p class="site-footer__copy">© 2026 Toonsquare Inc. 교육용 웹툰 창작 플랫폼</p>
    </div>
  </footer>

  <!-- 바텀 네비 (모바일) -->
  <nav class="bottom-nav">
    <a href="./index.html" class="bottom-nav__item"><span>🏠</span><span>홈</span></a>
    <a href="category.html" class="bottom-nav__item bottom-nav__item--active"><span>📚</span><span>카테고리</span></a>
    <a href="#" class="bottom-nav__fab" id="mobile-make-btn">✨</a>
    <a href="#" class="bottom-nav__item"><span>❤️</span><span>즐겨찾기</span></a>
    <a href="#" class="bottom-nav__item"><span>👤</span><span>My</span></a>
  </nav>

  <script src="./assets/js/data.js?v=13"></script>
  <script src="./assets/js/renderer.js?v=13"></script>
  <script src="./assets/js/category.js?v=13"></script>
</body>
</html>
