<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="no-cache">
  <title>TOONING BOOKS — 웹툰으로 만드는 독서 플랫폼</title>
  <link rel="stylesheet" href="./assets/css/tokens.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="container">
      <a href="./index.html" class="tooning-logo">
        <span class="tooning-logo__word">tooning</span>
        <svg class="tooning-logo__smile" viewBox="0 0 44 22" xmlns="http://www.w3.org/2000/svg">
          <path d="M 3 3 Q 22 19 41 3" stroke="#FF5252" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tooning-logo__sub">BOOKS</span>
      </a>

      <div class="site-header__search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" id="search-input" placeholder="도서 제목, 작가, 태그 검색">
      </div>

      <div class="site-header__actions">
        <span id="admin-badge" class="admin-badge" style="display:none">⚙️ 관리자 모드</span>
        <button class="btn-icon" id="admin-toggle-btn" title="관리자 패널 열기">⚙️</button>
        <button class="btn-icon" title="알림">🔔</button>
        <button class="btn-icon" title="라이브러리">📚</button>
        <button class="btn-icon" title="프로필">👤</button>
      </div>
    </div>
  </header>

  <!-- ═══ NAV ═══ -->
  <nav class="site-nav">
    <div class="container">
      <a class="site-nav__item site-nav__item--active" href="./index.html">홈</a>
      <a class="site-nav__item" href="category.html?id=cat_popular">인기도서</a>
      <a class="site-nav__item" href="category.html">카테고리</a>
      <a class="site-nav__item" href="#">이벤트</a>
      <a class="site-nav__item" href="#">웹툰만들기</a>
    </div>
  </nav>

  <!-- ═══ HERO BANNER ═══ -->
  <div class="hero-wrap">
    <div class="hero" id="hero-banner">
      <!-- 슬라이드 복수: JS가 featured 도서로 채움 -->
      <div class="hero__slide hero__slide--active" id="hero-slide-0">
        <div class="hero__text">
          <span class="hero__tag" id="hero-tag-0">📖 이달의 추천</span>
          <h1 class="hero__title" id="hero-title-0">도서를 불러오는 중...</h1>
          <p class="hero__sub" id="hero-sub-0">잠시만 기다려주세요.</p>
          <div class="hero__meta" id="hero-meta-0"></div>
          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:8px">
            <button class="hero__cta" id="hero-cta-0" data-book-id="">
              📖 자세히 보기
            </button>
            <button class="hero__cta hero__cta--secondary" id="hero-like-0">
              ❤️ 좋아요
            </button>
          </div>
        </div>
        <div class="hero__cover" id="hero-cover-0">
          <div class="hero__cover-book" id="hero-cover-inner-0">📚</div>
        </div>
      </div>
    </div>

    <!-- 슬라이더 컨트롤 -->
    <div class="hero-controls">
      <div class="hero__dots" id="hero-dots"></div>
      <div style="display:flex;gap:4px">
        <button class="hero-arrow" id="hero-prev">‹</button>
        <button class="hero-arrow" id="hero-next">›</button>
      </div>
    </div>
  </div>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main id="main-content" style="padding-bottom:20px">
    <div class="loading-state">
      <div style="font-size:40px;margin-bottom:16px">📚</div>
      <p>도서 목록을 불러오는 중...</p>
    </div>
  </main>

  <!-- ═══ WEBTOON SECTION ═══ -->
  <section id="webtoon-section" class="book-section" style="background:var(--color-primary-bg)">
    <div class="container">
      <div class="section-header">
        <div>
          <div class="section-header__label">USER WEBTOONS</div>
          <h2 class="section-header__title">학생들이 만든 웹툰</h2>
        </div>
        <a class="section-header__more" href="#">전체 보기 →</a>
      </div>
      <div class="book-scroll" id="webtoon-scroll"></div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="site-footer">
    <div class="container">
      <div class="tooning-logo tooning-logo--sm">
        <span class="tooning-logo__word">tooning</span>
        <svg class="tooning-logo__smile" viewBox="0 0 44 22" xmlns="http://www.w3.org/2000/svg">
          <path d="M 3 3 Q 22 19 41 3" stroke="#FF5252" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tooning-logo__sub">BOOKS</span>
      </div>
      <p class="site-footer__copy">© 2026 Toonsquare Inc. 교육용 웹툰 창작 플랫폼</p>
    </div>
  </footer>

  <!-- ═══ ADMIN OVERLAY & PANEL ═══ -->
  <div class="admin-overlay" id="admin-overlay"></div>
  <aside class="admin-panel" id="admin-panel">
    <div class="admin-panel__header">
      <div>
        <div style="font-size:11px;color:var(--color-text-3);letter-spacing:1px;margin-bottom:4px">⚙️ ADMIN DASHBOARD</div>
        <div class="admin-panel__title">관리자 패널</div>
      </div>
      <button class="admin-panel__close" id="admin-close-btn">✕</button>
    </div>

    <div style="display:flex;border-bottom:1px solid var(--color-border)">
      <button class="site-nav__item site-nav__item--active" data-admin-tab="books" style="flex:1;text-align:center;border:none;background:none" id="admin-tab-books">도서</button>
      <button class="site-nav__item" data-admin-tab="banners" style="flex:1;text-align:center;border:none;background:none">배너</button>
      <button class="site-nav__item" data-admin-tab="notices" style="flex:1;text-align:center;border:none;background:none">공지</button>
    </div>

    <div class="admin-panel__body">
      <!-- 도서 추가 폼 -->
      <div style="background:var(--color-chip);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <strong style="font-size:14px">+ 새 도서 등록</strong>
          <span style="font-size:10px;color:var(--color-text-3);background:var(--color-edit-bg);padding:2px 8px;border-radius:var(--radius-pill);border:1px solid var(--color-edit-border)">v0.3 로컬 저장</span>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <label class="form-label">도서 제목 *</label>
            <input type="text" id="admin-title" placeholder="예: 어린 왕자" class="form-input">
          </div>
          <div>
            <label class="form-label">작가</label>
            <input type="text" id="admin-author" placeholder="예: 생텍쥐페리" class="form-input">
          </div>
          <div>
            <label class="form-label">한 줄 소개</label>
            <input type="text" id="admin-subtitle" placeholder="책을 소개하는 한 문장" class="form-input">
          </div>
          <div>
            <label class="form-label">학년 구분</label>
            <div style="display:flex;gap:6px">
              <button class="chip chip--active" data-grade-select="elementary">초등</button>
              <button class="chip" data-grade-select="middle">중등</button>
              <button class="chip" data-grade-select="high">고등</button>
            </div>
          </div>
          <div>
            <label class="form-label">카드 배경색</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="color-pick color-pick--active" data-color="#3D3080" style="background:#3D3080"></button>
              <button class="color-pick" data-color="#F5D5E5" style="background:#F5D5E5"></button>
              <button class="color-pick" data-color="#FFD8B0" style="background:#FFD8B0"></button>
              <button class="color-pick" data-color="#B8DFD5" style="background:#B8DFD5"></button>
              <button class="color-pick" data-color="#DEC8F0" style="background:#DEC8F0"></button>
              <button class="color-pick" data-color="#F8B6A0" style="background:#F8B6A0"></button>
              <button class="color-pick" data-color="#FF6B35" style="background:#FF6B35"></button>
            </div>
          </div>
          <div>
            <label class="form-label">카테고리 (복수 선택)</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap" id="admin-cat-chips"></div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:16px">
          <button id="admin-cancel" class="btn-outline" style="flex:1">취소</button>
          <button id="admin-save" class="btn-primary" style="flex:2">💾 저장하기</button>
        </div>
      </div>

      <!-- 등록된 도서 목록 -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <strong style="font-size:13px;color:var(--color-text-2)">등록된 도서 <span id="admin-count" style="color:var(--color-primary)"></span></strong>
        </div>
        <div id="admin-book-list" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
    </div>
  </aside>

  <!-- 바텀 네비 (모바일) -->
  <nav class="bottom-nav">
    <a href="./index.html" class="bottom-nav__item bottom-nav__item--active"><span>🏠</span><span>홈</span></a>
    <a href="category.html" class="bottom-nav__item"><span>📚</span><span>카테고리</span></a>
    <a href="https://tooning.io" target="_blank" class="bottom-nav__fab">✨</a>
    <a href="#" class="bottom-nav__item"><span>❤️</span><span>즐겨찾기</span></a>
    <a href="#" class="bottom-nav__item"><span>👤</span><span>My</span></a>
  </nav>

  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/renderer.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/admin.js"></script>
</body>
</html>
