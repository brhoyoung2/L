<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="cache-control" content="no-cache">
  <title>TOONING BOOKS — 웹툰으로 만드는 독서 플랫폼</title>
  <link rel="stylesheet" href="./assets/css/tokens.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header">
    <div class="container">
      <a href="./index.html" class="tooning-logo">
        <span class="tooning-logo__word">tooning</span>
        <svg class="tooning-logo__smile" viewBox="0 0 44 22" xmlns="http://www.w3.org/2000/svg">
          <path d="M 3 3 Q 22 19 41 3" stroke="#FF5252" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tooning-logo__sub">BOOKS</span>
      </a>

      <div class="site-header__search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="search" placeholder="도서 제목, 작가, 태그 검색">
      </div>

      <div class="site-header__actions">
        <span id="admin-badge" class="admin-badge hidden" style="display:none">
          ⚙️ 관리자 모드
        </span>
        <button class="btn-icon" id="admin-toggle-btn" title="관리자 패널">⚙️</button>
        <button class="btn-icon" title="알림">🔔</button>
        <button class="btn-icon" title="라이브러리">📚</button>
        <button class="btn-icon" title="프로필">👤</button>
      </div>
    </div>
  </header>

  <!-- ═══ NAV ═══ -->
  <nav class="site-nav">
    <div class="container">
      <a class="site-nav__item site-nav__item--active" href="./index.html">홈</a>
      <a class="site-nav__item" href="category.html?id=cat_popular">인기도서</a>
      <a class="site-nav__item" href="category.html">카테고리</a>
      <a class="site-nav__item" href="#">이벤트</a>
      <a class="site-nav__item" href="#">웹툰만들기</a>
    </div>
  </nav>

  <!-- ═══ HERO BANNER ═══ -->
  <div style="padding:0 80px;max-width:calc(var(--container-max) + 160px);margin:0 auto">
    <div class="hero">
      <div class="hero__text">
        <span class="hero__tag">📖 이달의 추천</span>
        <h1 class="hero__title" id="hero-title">로딩 중...</h1>
        <p class="hero__sub" id="hero-sub"></p>
        <button class="hero__cta" id="hero-cta" data-book-id="">
          📖 자세히 보기
        </button>
        <div class="hero__dots">
          <button class="hero__dot hero__dot--active"></button>
          <button class="hero__dot"></button>
          <button class="hero__dot"></button>
        </div>
      </div>
      <div class="hero__illust" id="hero-illust">📚</div>
    </div>
  </div>

  <!-- ═══ MAIN CONTENT (섹션 동적 삽입) ═══ -->
  <main id="main-content" style="padding-bottom:20px">
    <!-- 도서 섹션이 JS로 삽입됩니다 -->
    <div style="padding:60px;text-align:center;color:var(--color-text-3)">
      <div style="font-size:40px;margin-bottom:16px">📚</div>
      <p>도서 목록을 불러오는 중...</p>
    </div>
  </main>

  <!-- ═══ WEBTOON SECTION ═══ -->
  <section id="webtoon-section" class="book-section" style="background:var(--color-primary-bg)">
    <div class="container">
      <div class="section-header">
        <div>
          <div class="section-header__label">USER WEBTOONS</div>
          <h2 class="section-header__title">이 책으로 만든 학생 웹툰</h2>
        </div>
        <a class="section-header__more" href="#">전체 보기 →</a>
      </div>
      <div class="book-scroll">
        <!-- 웹툰 카드 JS로 삽입 -->
      </div>
    </div>
  </section>

  <!-- ═══ FOOTER ═══ -->
  <footer class="site-footer">
    <div class="container">
      <div class="tooning-logo tooning-logo--sm">
        <span class="tooning-logo__word">tooning</span>
        <svg class="tooning-logo__smile" viewBox="0 0 44 22" xmlns="http://www.w3.org/2000/svg">
          <path d="M 3 3 Q 22 19 41 3" stroke="#FF5252" stroke-width="3.5" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="tooning-logo__sub">BOOKS</span>
      </div>
      <p class="site-footer__copy">© 2026 Toonsquare Inc. 교육용 웹툰 창작 플랫폼</p>
    </div>
  </footer>

  <!-- ═══ ADMIN OVERLAY & PANEL ═══ -->
  <div class="admin-overlay" id="admin-overlay"></div>
  <aside class="admin-panel" id="admin-panel">
    <div class="admin-panel__header">
      <div>
        <div style="font-size:11px;color:var(--color-text-3);letter-spacing:1px;margin-bottom:4px">⚙️ ADMIN</div>
        <div class="admin-panel__title">관리자 패널</div>
      </div>
      <button class="admin-panel__close" id="admin-close-btn">✕</button>
    </div>

    <!-- 탭 -->
    <div style="display:flex;border-bottom:1px solid var(--color-border)">
      <button class="site-nav__item site-nav__item--active" style="flex:1;text-align:center;border:none;background:none">도서 (6)</button>
      <button class="site-nav__item" style="flex:1;text-align:center;border:none;background:none">배너</button>
      <button class="site-nav__item" style="flex:1;text-align:center;border:none;background:none">공지</button>
    </div>

    <div class="admin-panel__body">
      <!-- 도서 추가 폼 (v0.3: UI만, localStorage 저장) -->
      <div style="background:var(--color-chip);border-radius:var(--radius-lg);padding:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <strong style="font-size:14px">새 도서 추가</strong>
          <span style="font-size:11px;color:var(--color-text-3)">v0.3: UI 데모</span>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <label style="font-size:12px;color:var(--color-text-2);display:block;margin-bottom:4px">도서 제목 *</label>
            <input type="text" id="admin-title" placeholder="예: 어린 왕자"
              style="width:100%;padding:8px 12px;border:1.5px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-family);font-size:14px;outline:none">
          </div>
          <div>
            <label style="font-size:12px;color:var(--color-text-2);display:block;margin-bottom:4px">작가</label>
            <input type="text" id="admin-author" placeholder="예: 생텍쥐페리"
              style="width:100%;padding:8px 12px;border:1.5px solid var(--color-border);border-radius:var(--radius-md);font-family:var(--font-family);font-size:14px;outline:none">
          </div>
          <div>
            <label style="font-size:12px;color:var(--color-text-2);display:block;margin-bottom:4px">학년 구분</label>
            <div style="display:flex;gap:8px">
              <button class="chip chip--active" data-grade-select="elementary">초등</button>
              <button class="chip" data-grade-select="middle">중등</button>
              <button class="chip" data-grade-select="high">고등</button>
            </div>
          </div>
          <div>
            <label style="font-size:12px;color:var(--color-text-2);display:block;margin-bottom:6px">카드 배경색</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="color-pick" data-color="#3D3080" style="width:28px;height:28px;border-radius:50%;background:#3D3080;border:3px solid #3D3080;cursor:pointer"></button>
              <button class="color-pick" data-color="#F5D5E5" style="width:28px;height:28px;border-radius:50%;background:#F5D5E5;border:2px solid var(--color-border);cursor:pointer"></button>
              <button class="color-pick" data-color="#FFD8B0" style="width:28px;height:28px;border-radius:50%;background:#FFD8B0;border:2px solid var(--color-border);cursor:pointer"></button>
              <button class="color-pick" data-color="#B8DFD5" style="width:28px;height:28px;border-radius:50%;background:#B8DFD5;border:2px solid var(--color-border);cursor:pointer"></button>
              <button class="color-pick" data-color="#DEC8F0" style="width:28px;height:28px;border-radius:50%;background:#DEC8F0;border:2px solid var(--color-border);cursor:pointer"></button>
              <button class="color-pick" data-color="#F8B6A0" style="width:28px;height:28px;border-radius:50%;background:#F8B6A0;border:2px solid var(--color-border);cursor:pointer"></button>
              <button class="color-pick" data-color="#FF6B35" style="width:28px;height:28px;border-radius:50%;background:#FF6B35;border:2px solid var(--color-border);cursor:pointer"></button>
            </div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:16px">
          <button id="admin-cancel" style="flex:1;padding:10px;border:1.5px solid var(--color-border);border-radius:var(--radius-md);background:transparent;font-family:var(--font-family);font-size:13px;font-weight:600;color:var(--color-text-2)">취소</button>
          <button id="admin-save" style="flex:2;padding:10px;border:none;border-radius:var(--radius-md);background:var(--color-primary);color:#fff;font-family:var(--font-family);font-size:13px;font-weight:700">💾 저장하기</button>
        </div>
        <p style="font-size:11px;color:var(--color-text-3);margin:8px 0 0;text-align:center">v0.3: 로컬 저장만 됩니다. 실제 반영은 v0.4+</p>
      </div>

      <!-- 등록된 도서 목록 -->
      <div>
        <strong style="font-size:13px;color:var(--color-text-2)">등록된 도서</strong>
        <div id="admin-book-list" style="margin-top:10px;display:flex;flex-direction:column;gap:8px"></div>
      </div>
    </div>
  </aside>

  <!-- ═══ 관리자 패널 JS ═══ -->
  <style>
    .hidden { display: none !important; }
  </style>

  <script src="./assets/js/data.js"></script>
  <script src="./assets/js/renderer.js"></script>
  <script src="./assets/js/app.js"></script>
  <script>
    /* 관리자 패널 — 색상 선택 & 학년 선택 & 저장 */
    let selectedColor = '#3D3080';
    let selectedGrade = 'elementary';

    document.addEventListener('click', e => {
      const colorBtn = e.target.closest('.color-pick');
      if (colorBtn) {
        document.querySelectorAll('.color-pick').forEach(b =>
          b.style.border = '2px solid var(--color-border)');
        colorBtn.style.border = `3px solid ${colorBtn.dataset.color}`;
        selectedColor = colorBtn.dataset.color;
      }

      const gradeBtn = e.target.closest('[data-grade-select]');
      if (gradeBtn) {
        document.querySelectorAll('[data-grade-select]').forEach(b =>
          b.classList.remove('chip--active'));
        gradeBtn.classList.add('chip--active');
        selectedGrade = gradeBtn.dataset.gradeSelect;
      }

      if (e.target.closest('#admin-save')) {
        const title = document.getElementById('admin-title').value.trim();
        const author = document.getElementById('admin-author').value.trim();
        if (!title) { alert('도서 제목을 입력하세요.'); return; }
        const saved = JSON.parse(localStorage.getItem('tb_local_books') || '[]');
        saved.push({ title, author, grade: selectedGrade, cover_color: selectedColor, created: new Date().toISOString() });
        localStorage.setItem('tb_local_books', JSON.stringify(saved));
        document.getElementById('admin-title').value = '';
        document.getElementById('admin-author').value = '';
        renderAdminList();
        alert(`"${title}" 저장됨 (로컬)\nv0.4+에서 실제 반영됩니다.`);
      }

      if (e.target.closest('#admin-cancel')) {
        document.getElementById('admin-title').value = '';
        document.getElementById('admin-author').value = '';
      }
    });

    function renderAdminList() {
      const list = document.getElementById('admin-book-list');
      const saved = JSON.parse(localStorage.getItem('tb_local_books') || '[]');
      if (!saved.length) { list.innerHTML = '<p style="font-size:13px;color:var(--color-text-3)">아직 추가된 도서가 없습니다.</p>'; return; }
      list.innerHTML = saved.map((b, i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--color-chip);border-radius:var(--radius-md)">
          <div style="width:32px;height:40px;border-radius:6px;background:${b.cover_color};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.title}</div>
            <div style="font-size:11px;color:var(--color-text-3)">${b.author || '작가 미입력'} · ${b.grade}</div>
          </div>
          <button data-del-idx="${i}" style="border:none;background:none;font-size:16px;color:var(--color-text-3);cursor:pointer">🗑</button>
        </div>`).join('');

      list.querySelectorAll('[data-del-idx]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.delIdx);
          const items = JSON.parse(localStorage.getItem('tb_local_books') || '[]');
          items.splice(idx, 1);
          localStorage.setItem('tb_local_books', JSON.stringify(items));
          renderAdminList();
        });
      });
    }

    renderAdminList();
  </script>
</body>
</html>
