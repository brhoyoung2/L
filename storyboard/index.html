<!DOCTYPE html>

<body class="p-4 md:p-8 max-w-4xl mx-auto">

</div>

<div><span class="text-purple-400 font-bold text-xs uppercase tracking-wider block mb-1">🎥 앵글 및 구도</span><p class="text-sm text-gray-300 leading-relaxed">dynamic angle, full body, looking back</p></div>
</div>

</div>
