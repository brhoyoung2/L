const GH_RAW = (path) =>

// Safe base64 encode/decode for Unicode (Korean chars)
const b64enc = (str) =>
  btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
    (_, p1) => String.fromCharCode(parseInt(p1, 16))));
const b64dec = (b64) =>
  decodeURIComponent(atob(b64).split('').map(
    c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));

async function ghGet(path, token) {
  const r = await fetch(
    `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${path}?ref=${GH.branch}`,
    { headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' } }
  );
  if (!r.ok) return null;
  return r.json();
}

async function ghPut(path, content_b64, message, sha, token) {
  const body = { message, content: content_b64, branch: GH.branch };
  if (sha) body.sha = sha;
  const r = await fetch(
    `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/${path}`,
    { method: 'PUT', headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'GitHub PUT failed'); }
  return r.json();
}

async function uploadImage(charId, dataUrl, token) {
  const ext = (dataUrl.match(/data:image\/(\w+)/) || [])[1] || 'png';
  const filename = `char_${charId}_${Date.now()}.${ext}`;
  const path = `${GH.imgDir}/${filename}`;
  const b64 = dataUrl.split(',')[1];
  await ghPut(path, b64, `Add image: ${filename}`, null, token);
  return `https://raw.githubusercontent.com/${GH.owner}/${GH.repo}/${GH.branch}/${path}`;
}

async function syncCharacters(chars, token) {
  // Strip large base64 blobs before saving (keep only URLs)
  const clean = chars.map(c => ({
    ...c,
    img: c.img && c.img.startsWith('http') ? c.img : null
  }));
  const existing = await ghGet(GH.dataFile, token);
  const sha = existing?.sha || null;
  await ghPut(GH.dataFile, b64enc(JSON.stringify(clean, null, 2)), 'Sync characters.json', sha, token);
}

async function loadCharacters(token) {
  const file = await ghGet(GH.dataFile, token);
  if (!file) return null;
  try { return JSON.parse(b64dec(file.content.replace(/\n/g, ''))); }
  catch { return null; }
}

function Avatar({ name, gender, size=80, radius }) {
  const colors = gender==="female" ? ["#2a1a3a","#4a2a6a"] : ["#0f1a2a","#1a3a4a"];
  const r = radius !== undefined ? radius : (size < 60 ? "50%" : "10px");

      background:`linear-gradient(135deg,${colors[0]},${colors[1]})`,

      fontSize:size*0.38, fontWeight:600, color:"#ffffff70", userSelect:"none", flexShrink:0 }}>
      {name?.[0] ?? "?"}
    </div>
  );
}

function IBtn({ onClick, active, danger, warn, children, title, disabled }) {
  return (
    <button title={title} onClick={onClick} disabled={disabled}
      style={{ padding:"2px 8px", fontSize:"10px", borderRadius:"4px", cursor: disabled ? "default" : "pointer",
        fontFamily:"inherit", transition:"all .13s", border:"none", opacity: disabled ? 0.5 : 1,
        background: active ? "#1a2a1a" : danger ? "#1a1010" : warn ? "#1a1a0a" : "#161626",
        color: active ? "#55bb55" : danger ? "#cc5555" : warn ? "#aaaa44" : "#6666aa" }}>
      {children}
    </button>
  );
}

function App() {

  });

  // ── ui state ──
  const [selected,      setSelected]      = useState(characters[0]);
  const [searchQuery,   setSearchQuery]   = useState("");
  const [filterGender,  setFilterGender]  = useState(null);
  const [filterGenre,   setFilterGenre]   = useState(null);
  const [editedPrompts, setEditedPrompts] = useState({});
  const [copiedKey,     setCopiedKey]     = useState(null);
  const [artEditing,    setArtEditing]    = useState(false);
  const [artCopied,     setArtCopied]     = useState(false);

  // ── modal state ──

  const [showSettings,  setShowSettings]  = useState(false);
  const [inputText,     setInputText]     = useState("");
  const [analyzing,     setAnalyzing]     = useState(false);
  const [analyzed,      setAnalyzed]      = useState(null);
  const [analyzeErr,    setAnalyzeErr]    = useState("");
  const [saveStep,      setSaveStep]      = useState("input");

  // ── github state ──
  const [ghStatus,      setGhStatus]      = useState("idle"); // idle|syncing|ok|error
  const [ghMsg,         setGhMsg]         = useState("");
  const [imgUploading,  setImgUploading]  = useState(false);

  // ── settings draft ──
  const [draftToken,    setDraftToken]    = useState(ghToken);
  const [draftAiKey,    setDraftAiKey]    = useState(anthropicKey);
  const [testingConn,   setTestingConn]   = useState(false);
  const [connResult,    setConnResult]    = useState(null);

  const fileRef       = useRef(null);
  const uploadTarget  = useRef(null);

  /* ── persist to localStorage ── */
  useEffect(() => {
    try { localStorage.setItem('cp_chars', JSON.stringify(characters)); } catch {}
  }, [characters]);
  useEffect(() => { localStorage.setItem('cp_art', artStyle); }, [artStyle]);

  /* ── keep selected in sync ── */
  useEffect(() => {
    if (selected) {
      const fresh = characters.find(c => c.id === selected.id);
      if (fresh) setSelected(fresh);
    }
  }, [characters]);

  /* ── load from GitHub on mount (if token present) ── */
  useEffect(() => {
    if (!ghToken) return;
    (async () => {
      try {
        const loaded = await loadCharacters(ghToken);
        if (loaded && loaded.length) {
          setCharacters(loaded);
          setSelected(loaded[0]);
          setGhMsg("GitHub에서 불러옴");
        }
      } catch {}
    })();
  }, []);

  /* ─── derived ─── */
  const currentPrompts = useMemo(() => {
    if (!selected) return {};
    return { ...selected.prompts, ...(editedPrompts[selected.id] || {}) };
  }, [selected, editedPrompts]);

  const filtered = useMemo(() => characters.filter(c => {
    if (filterGender && c.gender !== filterGender) return false;
    if (filterGenre  && c.genre  !== filterGenre)  return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return c.name.includes(q) || c.tags.some(t => t.includes(q))
        || (GENRE_LABELS[c.genre]||"").includes(q) || (GENDER_LABELS[c.gender]||"").includes(q);
    }
    return true;
  }), [characters, filterGender, filterGenre, searchQuery]);

  /* ─── prompt helpers ─── */
  const updatePrompt = (key, val) =>
    setEditedPrompts(p => ({ ...p, [selected.id]: { ...(p[selected.id]||{}), [key]: val } }));

  const copyField = async (key) => {
    await navigator.clipboard.writeText(currentPrompts[key] || "").catch(()=>{});
    setCopiedKey(key); setTimeout(() => setCopiedKey(null), 1500);
  };

  const copyAll = async () => {
    const body = PROMPT_FIELDS.map(f => currentPrompts[f.key]).filter(Boolean).join(", ");
    const full  = artStyle ? `${artStyle}, ${body}` : body;
    await navigator.clipboard.writeText(full).catch(()=>{});
    setCopiedKey("__all__"); setTimeout(() => setCopiedKey(null), 1500);
  };

  const resetPrompt = (key) =>
    setEditedPrompts(p => { const u={...(p[selected.id]||{})}; delete u[key]; return {...p,[selected.id]:u}; });

  const copyArtStyle = async () => {
    await navigator.clipboard.writeText(artStyle).catch(()=>{});
    setArtCopied(true); setTimeout(() => setArtCopied(false), 1500);
  };

  /* ─── image upload ─── */
  const applyCharImage = (charId, url) => {
    setCharacters(p => p.map(c => c.id === charId ? {...c, img: url} : c));
  };

  const handleFileChange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const charId = uploadTarget.current;

    // Show preview immediately (base64)
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      applyCharImage(charId, dataUrl); // instant local preview

      // If GitHub token → upload to repo
      if (ghToken) {
        setImgUploading(true);
        setGhMsg("이미지 업로드 중…");
        try {
          const ghUrl = await uploadImage(charId, dataUrl, ghToken);
          applyCharImage(charId, ghUrl);
          setGhMsg("✓ 이미지 GitHub에 저장됨");
          setGhStatus("ok");
        } catch (err) {
          setGhMsg("이미지 업로드 실패: " + err.message);
          setGhStatus("error");
        } finally {
          setImgUploading(false);
          setTimeout(() => setGhMsg(""), 3000);
        }
      }
    };
    reader.readAsDataURL(file);
  };

  const triggerUpload = (charId) => {
    uploadTarget.current = charId;
    fileRef.current?.click();
  };

  /* ─── GitHub sync ─── */
  const handleSync = async () => {
    if (!ghToken) { setShowSettings(true); return; }
    setGhStatus("syncing"); setGhMsg("GitHub 동기화 중…");
    try {
      // First upload any pending base64 images
      let updatedChars = [...characters];
      for (let i = 0; i < updatedChars.length; i++) {
        const c = updatedChars[i];
        if (c.img && c.img.startsWith('data:')) {
          try {
            const url = await uploadImage(c.id, c.img, ghToken);
            updatedChars[i] = { ...c, img: url };
          } catch {}
        }
      }
      setCharacters(updatedChars);
      await syncCharacters(updatedChars, ghToken);
      setGhStatus("ok"); setGhMsg("✓ GitHub 동기화 완료");
    } catch (err) {
      setGhStatus("error"); setGhMsg("동기화 실패: " + err.message);
    } finally {
      setTimeout(() => { setGhMsg(""); setGhStatus("idle"); }, 3000);
    }
  };

  /* ─── analyze ─── */
  const analyzePrompt = async () => {
    if (!inputText.trim()) return;
    const key = anthropicKey || "";
    if (!key) { setAnalyzeErr("Anthropic API 키가 없습니다. ⚙️ 설정에서 입력해주세요."); return; }
    setAnalyzing(true); setAnalyzeErr("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key": key, "anthropic-version":"2023-06-01" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:AI_SYSTEM, messages:[{role:"user",content:inputText}] })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text || "";
      setAnalyzed(JSON.parse(text.replace(/```json|```/g,"").trim()));
      setSaveStep("preview");
    } catch(err) {
      setAnalyzeErr("분석 실패: " + err.message);
    } finally { setAnalyzing(false); }
  };

  const saveCharacter = () => {
    if (!analyzed) return;
    const nc = { id:Date.now(), name:analyzed.name||"새 캐릭터", gender:analyzed.gender||"female", genre:analyzed.genre||"modern", img:null, tags:analyzed.tags||[], prompts:{base:"",hair:"",skin:"",eyes:"",accessories:"",top:"",bottom:"",legwear:"",shoes:"",...analyzed.prompts} };
    setCharacters(p => [nc,...p]);
    setSelected(nc);
    setSaveStep("done");
    setTimeout(() => { setShowAdd(false); setInputText(""); setAnalyzed(null); setSaveStep("input"); }, 1100);
  };

  const closeAdd = () => { setShowAdd(false); setInputText(""); setAnalyzed(null); setSaveStep("input"); setAnalyzeErr(""); };

  /* ─── settings ─── */
  const testConnection = async () => {
    if (!draftToken) { setConnResult({ ok:false, msg:"토큰을 입력하세요" }); return; }
    setTestingConn(true); setConnResult(null);
    try {
      const r = await fetch(`https://api.github.com/repos/${GH.owner}/${GH.repo}`, { headers:{ Authorization:`token ${draftToken}` } });
      if (r.ok) setConnResult({ ok:true, msg:`✓ 연결 성공 · ${GH.owner}/${GH.repo}` });
      else setConnResult({ ok:false, msg:"연결 실패: 토큰을 확인하세요 (repo scope 필요)" });
    } catch { setConnResult({ ok:false, msg:"네트워크 오류" }); }
    finally { setTestingConn(false); }
  };

  const saveSettings = () => {
    setGhToken(draftToken); localStorage.setItem('cp_ghtoken', draftToken);
    setAnthropicKey(draftAiKey); localStorage.setItem('cp_aikey', draftAiKey);
    setShowSettings(false);
  };

  /* ─── style util ─── */
  const fBtnS = (active, color="#8888ff", bg="#1e1e3a", bdr="#3030ff30") => ({
    width:"100%", display:"block", marginBottom:"4px", padding:"8px 12px", borderRadius:"7px",
    fontSize:"12px", textAlign:"left", background: active ? bg : "transparent",
    color: active ? color : "#9090b0", border:`1px solid ${active ? bdr : "transparent"}`,
    transition:"all .15s", cursor:"pointer", fontFamily:"inherit",
  });

  const ghStatusColor = { idle:"#4a4a6a", syncing:"#8888ff", ok:"#44aa66", error:"#cc5555" }[ghStatus];
  const ghStatusIcon  = { idle:"◌", syncing:"⟳", ok:"✓", error:"⚠" }[ghStatus];

  /* ════════════ RENDER ════════════ */
  return (
    <div style={{ display:"flex", height:"100vh", width:"100%", background:"#09090f", fontFamily:"'DM Sans','Pretendard',sans-serif", color:"#e8e8f0", overflow:"hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:2px}
        input::placeholder,textarea::placeholder{color:#4a4a6a}
        textarea{resize:none}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
        .card{transition:all .2s ease;cursor:pointer}.card:hover{transform:translateY(-2px)}
        .hdrimg:hover .covr{opacity:1!important}
        .field-row{animation:fadeIn .3s ease forwards}
        .btn{transition:all .13s;cursor:pointer;border:none;font-family:inherit}.btn:active{transform:scale(.97)}
        .modal-bg{animation:fadeIn .2s ease}.modal-box{animation:fadeUp .25s ease}
        .spinner{width:15px;height:15px;border:2px solid #3a3a5a;border-top-color:#aaaaff;border-radius:50%;animation:spin .7s linear infinite}
        .spin-sm{width:11px;height:11px;border:1.5px solid #3a3a5a;border-top-color:#8888ff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
        .pulsing{animation:pulse 1.2s ease infinite}
      `}</style>

      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFileChange}/>

      {/* ══ LEFT PANEL ══ */}
      <div style={{ width:"220px", minWidth:"220px", background:"#0d0d16", borderRight:"1px solid #1a1a28", display:"flex", flexDirection:"column", padding:"20px 16px", gap:"18px", overflowY:"auto" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:"11px", letterSpacing:".15em", color:"#4a4a6a", textTransform:"uppercase", fontWeight:600 }}>CharPrompt</span>
          <button className="btn" onClick={() => { setDraftToken(ghToken); setDraftAiKey(anthropicKey); setConnResult(null); setShowSettings(true); }}
            title="설정" style={{ background:"none", border:"none", color:"#4a4a6a", fontSize:"15px", padding:"2px 4px", cursor:"pointer" }}>⚙️</button>
        </div>

        <div style={{ position:"relative" }}>
          <span style={{ position:"absolute", left:"10px", top:"50%", transform:"translateY(-50%)", color:"#4a4a6a", fontSize:"12px" }}>🔍</span>
          <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder="이름, 태그 검색..."
            style={{ width:"100%", background:"#13131f", border:"1px solid #1e1e2e", borderRadius:"8px", padding:"9px 10px 9px 30px", color:"#e8e8f0", fontSize:"13px", outline:"none" }}/>
        </div>

        <div>
          <div style={{ fontSize:"10px", letterSpacing:".12em", color:"#4a4a6a", marginBottom:"8px", textTransform:"uppercase" }}>성별</div>
          {[null,"female","male"].map(g => (
            <button key={g??"all"} className="btn" onClick={()=>setFilterGender(g)} style={fBtnS(filterGender===g)}>
              {g===null?"전체":GENDER_LABELS[g]}
            </button>
          ))}
        </div>

        <div>
          <div style={{ fontSize:"10px", letterSpacing:".12em", color:"#4a4a6a", marginBottom:"8px", textTransform:"uppercase" }}>장르</div>
          {[null,"modern","fantasy","historical"].map(g => (
            <button key={g??"all"} className="btn" onClick={()=>setFilterGenre(g)} style={fBtnS(filterGenre===g,"#6699ff","#1a1e2e","#3355ff30")}>
              {g===null?"전체":GENRE_LABELS[g]}
            </button>
          ))}
        </div>

        <div style={{ marginTop:"auto" }}>
          {/* GitHub status */}
          <div style={{ padding:"10px 12px", background:"#0f0f1a", borderRadius:"8px", border:"1px solid #1a1a28", marginBottom:"10px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
              <span style={{ color: ghStatusColor, fontSize:"11px" }} className={ghStatus==="syncing"?"pulsing":""}>{ghStatusIcon}</span>
              <span style={{ fontSize:"10px", color: ghStatusColor }}>
                {ghStatus==="idle" && (ghToken ? "GitHub 연결됨" : "GitHub 미연결")}
                {ghStatus==="syncing" && "동기화 중…"}
                {ghStatus==="ok" && "동기화 완료"}
                {ghStatus==="error" && "오류 발생"}
              </span>
            </div>
            {ghMsg && <div style={{ fontSize:"10px", color:"#8888aa", marginTop:"4px", lineHeight:"1.4" }}>{ghMsg}</div>}
          </div>

          <div style={{ padding:"10px 12px", background:"#0f0f1a", borderRadius:"8px", border:"1px solid #1a1a28" }}>
            <div style={{ fontSize:"11px", color:"#5a5a7a" }}>검색 결과</div>
            <div style={{ fontSize:"22px", fontWeight:600, color:"#8888ff" }}>{filtered.length}</div>
            <div style={{ fontSize:"11px", color:"#4a4a6a" }}>캐릭터</div>
          </div>
        </div>
      </div>

      {/* ══ CENTER PANEL ══ */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflowY:"auto", padding:"22px 20px" }}>
        <div style={{ marginBottom:"18px", display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
          <h1 style={{ fontSize:"17px", fontWeight:600, letterSpacing:"-0.02em", flex:1 }}>캐릭터 갤러리</h1>
          {filterGender && <span style={{ fontSize:"11px", padding:"3px 9px", background:"#1e1e3a", color:"#8888ff", borderRadius:"20px", border:"1px solid #3030ff30" }}>{GENDER_LABELS[filterGender]}</span>}
          {filterGenre  && <span style={{ fontSize:"11px", padding:"3px 9px", background:"#1a1e2e", color:"#6699ff", borderRadius:"20px", border:"1px solid #3355ff30" }}>{GENRE_LABELS[filterGenre]}</span>}
          {/* Sync button */}
          <button className="btn" onClick={handleSync} title="GitHub에 동기화"
            style={{ display:"flex", alignItems:"center", gap:"5px", padding:"8px 13px",
              background: ghToken ? "#0f1a0f" : "#131318",
              color: ghToken ? "#44aa66" : "#5a5a7a",
              borderRadius:"9px", fontSize:"12px", border:`1px solid ${ghToken?"#2a4a2a":"#2a2a3a"}` }}>
            {ghStatus==="syncing" ? <><div className="spin-sm"/> 동기화 중</> : <><span>⬆</span> GitHub 동기화</>}
          </button>
          <button className="btn" onClick={()=>setShowAdd(true)}
            style={{ display:"flex", alignItems:"center", gap:"6px", padding:"9px 16px", background:"linear-gradient(135deg,#3333aa,#5566ff)", color:"#fff", borderRadius:"10px", fontSize:"12px", fontWeight:600, boxShadow:"0 0 20px #5566ff22" }}>
            <span style={{ fontSize:"17px", lineHeight:1, marginTop:"-1px" }}>+</span> 캐릭터 추가
          </button>
        </div>

        {filtered.length===0
          ? <div style={{ textAlign:"center", color:"#3a3a5a", marginTop:"80px", fontSize:"13px" }}><div style={{ fontSize:"28px", marginBottom:"10px" }}>◌</div>검색 결과가 없습니다</div>
          : <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))", gap:"12px" }}>
              {filtered.map(char => {
                const isSelected = selected?.id === char.id;
                return (
                  <div key={char.id} className="card"
                    onClick={() => { if (!isSelected) setSelected(char); else triggerUpload(char.id); }}
                    style={{ background: isSelected?"#141422":"#0f0f1a", border: isSelected?"1.5px solid #5566ff":"1px solid #1a1a28", borderRadius:"14px", overflow:"hidden", boxShadow: isSelected?"0 0 22px #5566ff20":"none" }}>
                    <div style={{ aspectRatio:"1", position:"relative", display:"flex", alignItems:"center", justifyContent:"center", background:"#0c0c18", overflow:"hidden" }}>
                      {char.img
                        ? <img src={char.img} alt={char.name} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                        : <Avatar name={char.name} gender={char.gender} size={72} radius="0"/>
                      }
                      {isSelected && (
                        <div style={{ position:"absolute", inset:0, background:"#00000099", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"4px", cursor:"pointer" }}>
                          <span style={{ fontSize:"20px" }}>📷</span>
                          <span style={{ fontSize:"10px", color:"#ccccff", fontWeight:500 }}>{char.img?"이미지 변경":"이미지 추가"}</span>
                        </div>
                      )}
                      {isSelected && <div style={{ position:"absolute", inset:0, border:"2px solid #5566ff", pointerEvents:"none" }}/>}
                    </div>
                    <div style={{ padding:"10px 12px 12px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"5px" }}>
                        <span style={{ fontSize:"13px", fontWeight:600 }}>{char.name}</span>
                        <span style={{ fontSize:"9px", padding:"2px 5px", background:"#1a1e2a", color:"#6688cc", borderRadius:"4px" }}>{GENRE_LABELS[char.genre]}</span>
                      </div>
                      <div style={{ fontSize:"10px", color:"#5a5a7a" }}>{GENDER_LABELS[char.gender]} · {char.tags.slice(0,2).join(" · ")}</div>
                    </div>
                  </div>
                );
              })}
            </div>
        }
      </div>

      {/* ══ RIGHT PANEL ══ */}
      <div style={{ width:"380px", minWidth:"380px", background:"#0b0b14", borderLeft:"1px solid #1a1a28", display:"flex", flexDirection:"column", overflowY:"auto" }}>

        {/* Art Style */}
        <div style={{ padding:"14px 18px", borderBottom:"2px solid #1a1a28", background:"#0b0b14", position:"sticky", top:0, zIndex:20 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"8px" }}>
            <span style={{ fontSize:"9px", letterSpacing:".12em", color:"#7766aa", textTransform:"uppercase", fontWeight:600 }}>🎨 화풍 (Art Style)</span>
            <div style={{ display:"flex", gap:"5px" }}>
              <IBtn onClick={()=>setArtEditing(p=>!p)} active={artEditing}>{artEditing?"✓ 완료":"편집"}</IBtn>
              <IBtn onClick={copyArtStyle} active={artCopied}>{artCopied?"✓ 복사됨":"복사"}</IBtn>
              <IBtn onClick={()=>{ setArtStyle(""); setArtEditing(true); }} danger>삭제</IBtn>
            </div>
          </div>
          {artEditing
            ? <textarea value={artStyle} onChange={e=>setArtStyle(e.target.value)} rows={4} placeholder="화풍 프롬프트를 입력하세요..."
                style={{ width:"100%", background:"#0f0f1a", border:"1px solid #3a3a5a", borderRadius:"8px", padding:"9px 11px", color:"#c8d0ff", fontSize:"11px", fontFamily:"'DM Mono',monospace", lineHeight:"1.65", outline:"none" }}/>
            : <div onClick={()=>setArtEditing(true)} style={{ background:"#0a0a12", border:"1px solid #1e1e2e", borderRadius:"8px", padding:"9px 11px", minHeight:"48px", cursor:"text" }}>
                {artStyle
                  ? <p style={{ fontSize:"11px", color:"#7a7aaa", fontFamily:"'DM Mono',monospace", lineHeight:"1.65", wordBreak:"break-all" }}>{artStyle}</p>
                  : <p style={{ fontSize:"11px", color:"#3a3a5a", fontStyle:"italic" }}>클릭해서 화풍 입력</p>
                }
              </div>
          }
        </div>

        {/* Character detail */}
        {selected ? <>
          <div style={{ padding:"16px 18px 13px", borderBottom:"1px solid #1a1a28", background:"#0b0b14" }}>
            <div style={{ display:"flex", gap:"13px", alignItems:"center" }}>
              <div className="hdrimg" onClick={()=>triggerUpload(selected.id)}
                style={{ width:"54px", height:"54px", borderRadius:"50%", overflow:"hidden", border:"2px solid #2a2a4a", cursor:"pointer", position:"relative", flexShrink:0 }}>
                {selected.img
                  ? <img src={selected.img} alt={selected.name} style={{ width:"100%", height:"100%", objectFit:"cover" }}/>
                  : <Avatar name={selected.name} gender={selected.gender} size={54}/>
                }
                <div className="covr" style={{ position:"absolute", inset:0, background:"#000000aa", display:"flex", alignItems:"center", justifyContent:"center", opacity:0, transition:"opacity .15s" }}>
                  <span style={{ fontSize:"14px" }}>📷</span>
                </div>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ fontSize:"16px", fontWeight:600, letterSpacing:"-0.02em" }}>{selected.name}</div>
                <div style={{ fontSize:"11px", color:"#6666aa", marginTop:"2px" }}>{GENDER_LABELS[selected.gender]} · {GENRE_LABELS[selected.genre]}</div>
                {selected.img && selected.img.startsWith('http') && (
                  <div style={{ fontSize:"9px", color:"#44aa66", marginTop:"3px", display:"flex", alignItems:"center", gap:"4px" }}>
                    <span>⬆</span> GitHub 저장됨
                  </div>
                )}
                <div style={{ display:"flex", gap:"4px", marginTop:"5px", flexWrap:"wrap" }}>
                  {selected.tags.map(t=><span key={t} style={{ fontSize:"10px", padding:"2px 6px", background:"#161626", color:"#7777aa", borderRadius:"20px", border:"1px solid #2a2a3a" }}>#{t}</span>)}
                </div>
              </div>
            </div>
            <button className="btn" onClick={copyAll}
              style={{ width:"100%", marginTop:"11px", padding:"9px", background: copiedKey==="__all__"?"#22223a":"#161626", color: copiedKey==="__all__"?"#88aaff":"#9090c0", borderRadius:"8px", fontSize:"12px", fontWeight:500, border:"1px solid #2a2a3a" }}>
              {copiedKey==="__all__"?"✓ 전체 복사됨!":"📋 화풍 + 외형 전체 복사"}
            </button>
            {imgUploading && (
              <div style={{ marginTop:"8px", display:"flex", alignItems:"center", gap:"6px", fontSize:"11px", color:"#8888ff" }}>
                <div className="spinner" style={{ width:"11px", height:"11px" }}/> 이미지 GitHub 업로드 중…
              </div>
            )}
          </div>

          <div style={{ padding:"13px 18px", display:"flex", flexDirection:"column", gap:"10px" }}>
            {PROMPT_FIELDS.map((field,i)=>(
              <div key={field.key} className="field-row" style={{ animationDelay:`${i*.04}s` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"4px" }}>
                  <label style={{ fontSize:"9px", letterSpacing:".1em", color:"#5a5a7a", textTransform:"uppercase" }}>{field.label}</label>
                  <div style={{ display:"flex", gap:"4px" }}>
                    {editedPrompts[selected.id]?.[field.key] !== undefined && (
                      <IBtn onClick={()=>resetPrompt(field.key)} danger>원복</IBtn>
                    )}
                    <IBtn onClick={()=>copyField(field.key)} active={copiedKey===field.key}>
                      {copiedKey===field.key?"✓ 복사됨":"복사"}
                    </IBtn>
                  </div>
                </div>
                <textarea rows={2} value={currentPrompts[field.key]||""} onChange={e=>updatePrompt(field.key,e.target.value)}
                  placeholder={`${field.label}...`}
                  style={{ width:"100%", background:"#0f0f1a", border: editedPrompts[selected.id]?.[field.key]!==undefined?"1px solid #2a2a5a":"1px solid #1a1a28", borderRadius:"8px", padding:"8px 10px", color:"#c8c8e0", fontSize:"12px", fontFamily:"'DM Mono',monospace", lineHeight:"1.6", outline:"none" }}/>
              </div>
            ))}

            <div style={{ marginTop:"4px", padding:"13px", background:"#0a0a12", borderRadius:"10px", border:"1px solid #1a1a2a" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"7px" }}>
                <div style={{ fontSize:"9px", letterSpacing:".1em", color:"#4a4a6a", textTransform:"uppercase" }}>외형 프롬프트 미리보기</div>
                <IBtn onClick={copyAll} active={copiedKey==="__all__"}>
                  {copiedKey==="__all__" ? "✓ 복사됨" : "📋 전체 복사"}
                </IBtn>
              </div>
              <p style={{ fontSize:"11px", color:"#7070a0", fontFamily:"'DM Mono',monospace", lineHeight:"1.8", wordBreak:"break-word", overflowWrap:"break-word", whiteSpace:"pre-wrap", overflow:"hidden" }}>
                {PROMPT_FIELDS.map(f=>currentPrompts[f.key]).filter(Boolean).join(", ")||"—"}
              </p>
            </div>
          </div>
        </> : (
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", flex:1, color:"#3a3a5a", fontSize:"13px" }}>캐릭터를 선택하세요</div>
        )}
      </div>

      {/* ══ ADD CHARACTER MODAL ══ */}
      {showAdd && (
        <div className="modal-bg" onClick={closeAdd}
          style={{ position:"fixed", inset:0, background:"#000000cc", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"20px" }}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}
            style={{ width:"100%", maxWidth:"560px", background:"#0f0f1a", border:"1px solid #2a2a3a", borderRadius:"18px", overflow:"hidden", boxShadow:"0 24px 80px #00000099" }}>
            <div style={{ padding:"20px 24px 16px", borderBottom:"1px solid #1a1a28", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontSize:"15px", fontWeight:600 }}>캐릭터 추가</div>
                <div style={{ fontSize:"11px", color:"#5a5a7a", marginTop:"3px" }}>
                  {saveStep==="input"   && "외형 설명을 자유롭게 입력하세요 (한국어·영어 모두 가능)"}
                  {saveStep==="preview" && "AI 분석 결과를 확인하고 저장하세요"}
                  {saveStep==="done"    && "✦ 저장 완료!"}
                </div>
              </div>
              <button onClick={closeAdd} style={{ background:"none", border:"none", color:"#5a5a7a", fontSize:"18px", cursor:"pointer", lineHeight:1, padding:"2px 4px" }}>✕</button>
            </div>

            {saveStep==="input" && (
              <div style={{ padding:"20px 24px 24px" }}>
                <textarea value={inputText} onChange={e=>setInputText(e.target.value)} rows={8}
                  placeholder={"예시:\n아리아는 20대 초반의 여성으로, 긴 검은 생머리에 일자 앞머리가 있다.\n흰 피부에 날카로운 눈매, 얇은 은테 안경을 착용한다.\n흰 터틀넥에 검은 블레이저를 입고, 검은 스타킹에 힐을 신는다."}
                  style={{ width:"100%", background:"#0a0a12", border:"1px solid #1e1e2e", borderRadius:"10px", padding:"14px", color:"#d0d0e8", fontSize:"13px", fontFamily:"'DM Sans',sans-serif", lineHeight:"1.7", outline:"none" }}/>
                {analyzeErr && <div style={{ marginTop:"8px", fontSize:"12px", color:"#ff7070", padding:"8px 12px", background:"#1a0a0a", borderRadius:"7px", border:"1px solid #2a1010" }}>{analyzeErr}</div>}
                <div style={{ display:"flex", gap:"10px", marginTop:"14px" }}>
                  <button onClick={closeAdd} className="btn" style={{ flex:1, padding:"11px", background:"#161626", color:"#7070a0", borderRadius:"9px", fontSize:"13px", border:"1px solid #2a2a3a" }}>취소</button>
                  <button onClick={analyzePrompt} disabled={analyzing||!inputText.trim()} className="btn"
                    style={{ flex:2, padding:"11px", background: inputText.trim()?"linear-gradient(135deg,#3333aa,#5566ff)":"#161626", color: inputText.trim()?"#fff":"#4a4a6a", borderRadius:"9px", fontSize:"13px", fontWeight:600, display:"flex", alignItems:"center", justifyContent:"center", gap:"8px", opacity: analyzing?.8:1 }}>
                    {analyzing?<><div className="spinner"/><span>AI 분석 중…</span></>:"✦ AI로 자동 분류"}
                  </button>
                </div>
              </div>
            )}

            {saveStep==="preview" && analyzed && (
              <div style={{ padding:"18px 24px 24px", maxHeight:"72vh", overflowY:"auto" }}>
                <div style={{ display:"flex", gap:"12px", alignItems:"center", marginBottom:"16px", padding:"14px", background:"#0a0a12", borderRadius:"10px", border:"1px solid #1a1a28" }}>
                  <Avatar name={analyzed.name} gender={analyzed.gender} size={46}/>
                  <div>
                    <div style={{ fontSize:"15px", fontWeight:600 }}>{analyzed.name||"이름 없음"}</div>
                    <div style={{ fontSize:"11px", color:"#6666aa", marginTop:"2px" }}>{GENDER_LABELS[analyzed.gender]||"—"} · {GENRE_LABELS[analyzed.genre]||"—"}</div>
                    <div style={{ display:"flex", gap:"4px", marginTop:"6px", flexWrap:"wrap" }}>
                      {(analyzed.tags||[]).map(t=><span key={t} style={{ fontSize:"10px", padding:"2px 6px", background:"#161626", color:"#7777aa", borderRadius:"20px", border:"1px solid #2a2a3a" }}>#{t}</span>)}
                    </div>
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:"7px" }}>
                  {PROMPT_FIELDS.map(field=>{
                    const val = analyzed.prompts?.[field.key];
                    return (
                      <div key={field.key} style={{ padding:"10px 12px", background:"#0a0a12", borderRadius:"8px", border: val?"1px solid #1e1e30":"1px dashed #1a1a28" }}>
                        <div style={{ fontSize:"9px", color:"#4a4a6a", letterSpacing:".1em", textTransform:"uppercase", marginBottom:"3px" }}>{field.label}</div>
                        <div style={{ fontSize:"12px", color: val?"#c0c0e0":"#383850", fontFamily:"'DM Mono',monospace" }}>{val||"— 감지되지 않음"}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display:"flex", gap:"10px", marginTop:"16px" }}>
                  <button onClick={()=>setSaveStep("input")} className="btn" style={{ flex:1, padding:"11px", background:"#161626", color:"#7070a0", borderRadius:"9px", fontSize:"13px", border:"1px solid #2a2a3a" }}>← 다시 입력</button>
                  <button onClick={saveCharacter} className="btn" style={{ flex:2, padding:"11px", background:"linear-gradient(135deg,#1a4a2a,#2a7a4a)", color:"#aaffcc", borderRadius:"9px", fontSize:"13px", fontWeight:600 }}>✓ 갤러리에 저장</button>
                </div>
              </div>
            )}

            {saveStep==="done" && (
              <div style={{ padding:"44px 24px", textAlign:"center" }}>
                <div style={{ fontSize:"38px", marginBottom:"10px" }}>✦</div>
                <div style={{ fontSize:"15px", fontWeight:600, color:"#aaffcc" }}>갤러리에 저장되었습니다</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══ SETTINGS MODAL ══ */}
      {showSettings && (
        <div className="modal-bg" onClick={()=>setShowSettings(false)}
          style={{ position:"fixed", inset:0, background:"#000000cc", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:"20px" }}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}
            style={{ width:"100%", maxWidth:"480px", background:"#0f0f1a", border:"1px solid #2a2a3a", borderRadius:"18px", overflow:"hidden", boxShadow:"0 24px 80px #00000099" }}>
            <div style={{ padding:"20px 24px 16px", borderBottom:"1px solid #1a1a28", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div style={{ fontSize:"15px", fontWeight:600 }}>⚙️ 설정</div>
              <button onClick={()=>setShowSettings(false)} style={{ background:"none", border:"none", color:"#5a5a7a", fontSize:"18px", cursor:"pointer" }}>✕</button>
            </div>
            <div style={{ padding:"20px 24px 24px", display:"flex", flexDirection:"column", gap:"20px" }}>

              {/* GitHub */}
              <div>
                <div style={{ fontSize:"12px", fontWeight:600, color:"#8888cc", marginBottom:"6px", display:"flex", alignItems:"center", gap:"6px" }}>
                  <span>🐱</span> GitHub Personal Access Token
                </div>
                <div style={{ fontSize:"11px", color:"#5a5a7a", marginBottom:"10px", lineHeight:"1.6" }}>
                  <a href="https://github.com/settings/tokens/new" target="_blank" rel="noopener"
                    style={{ color:"#6688ff", textDecoration:"none" }}>github.com/settings/tokens</a>에서 발급 · <b style={{ color:"#8888aa" }}>repo</b> 스코프 체크 필수
                </div>
                <input type="password" value={draftToken} onChange={e=>setDraftToken(e.target.value)}
                  placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
                  style={{ width:"100%", background:"#0a0a12", border:"1px solid #1e1e2e", borderRadius:"8px", padding:"10px 12px", color:"#d0d0e8", fontSize:"13px", fontFamily:"'DM Mono',monospace", outline:"none", marginBottom:"8px" }}/>
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  <button onClick={testConnection} disabled={testingConn} className="btn"
                    style={{ padding:"7px 14px", background:"#161626", color:"#8888cc", borderRadius:"7px", fontSize:"12px", border:"1px solid #2a2a3a" }}>
                    {testingConn?<><div className="spin-sm"/> 테스트 중</>:"연결 테스트"}
                  </button>
                  {connResult && (
                    <span style={{ fontSize:"11px", color: connResult.ok?"#44aa66":"#cc5555" }}>{connResult.msg}</span>
                  )}
                </div>
                <div style={{ marginTop:"10px", padding:"10px 12px", background:"#0a0a12", borderRadius:"8px", border:"1px solid #1a1a28" }}>
                  <div style={{ fontSize:"10px", color:"#4a4a6a", marginBottom:"4px" }}>저장 경로</div>
                  <div style={{ fontSize:"11px", color:"#7070a0", fontFamily:"'DM Mono',monospace" }}>
                    📁 {GH.owner}/{GH.repo}/{GH.imgDir}/</div>
                  <div style={{ fontSize:"11px", color:"#7070a0", fontFamily:"'DM Mono',monospace", marginTop:"2px" }}>
                    📄 {GH.owner}/{GH.repo}/{GH.dataFile}</div>
                </div>
              </div>

              {/* Anthropic */}
              <div>
                <div style={{ fontSize:"12px", fontWeight:600, color:"#8888cc", marginBottom:"6px", display:"flex", alignItems:"center", gap:"6px" }}>
                  <span>✦</span> Anthropic API Key (AI 분석 기능용)
                </div>
                <div style={{ fontSize:"11px", color:"#5a5a7a", marginBottom:"10px" }}>
                  <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener"
                    style={{ color:"#6688ff", textDecoration:"none" }}>console.anthropic.com</a>에서 발급
                </div>
                <input type="password" value={draftAiKey} onChange={e=>setDraftAiKey(e.target.value)}
                  placeholder="sk-ant-xxxxxxxxxxxxxxxxxxxx"
                  style={{ width:"100%", background:"#0a0a12", border:"1px solid #1e1e2e", borderRadius:"8px", padding:"10px 12px", color:"#d0d0e8", fontSize:"13px", fontFamily:"'DM Mono',monospace", outline:"none" }}/>
              </div>

              <div style={{ display:"flex", gap:"10px" }}>
                <button onClick={()=>setShowSettings(false)} className="btn"
                  style={{ flex:1, padding:"11px", background:"#161626", color:"#7070a0", borderRadius:"9px", fontSize:"13px", border:"1px solid #2a2a3a" }}>취소</button>
                <button onClick={saveSettings} className="btn"
                  style={{ flex:2, padding:"11px", background:"linear-gradient(135deg,#2a2a6a,#4455aa)", color:"#ccccff", borderRadius:"9px", fontSize:"13px", fontWeight:600 }}>
                  ✓ 저장
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
